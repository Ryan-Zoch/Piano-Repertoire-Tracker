<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c8763f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Repertoire" />
  <title>Piano Repertoire — a cozy practice journal</title>
  <meta name="description" content="A warm, cozy place to log your piano practice and keep your repertoire." />
  <!-- Apply the saved (or time-of-day) theme before paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("piano-repertoire-tracker/theme");
        if (t !== "night" && t !== "day") {
          var h = new Date().getHours();
          t = (h >= 18 || h < 6) ? "night" : "day";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%B9%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="app">
    <!-- ===== Header ===== -->
    <header class="topbar">
      <div class="brand">
        <span class="brand__mark" aria-hidden="true">🎹</span>
        <div class="brand__text">
          <h1 class="brand__title">Piano Repertoire</h1>
          <p class="brand__tagline">your cozy practice journal</p>
        </div>
      </div>

      <nav class="tabs" aria-label="Main navigation">
        <button class="tab is-active" data-view="dashboard">
          <span class="tab__icon" aria-hidden="true">☕</span><span class="tab__label">Dashboard</span><span class="tab__short">Home</span>
        </button>
        <button class="tab" data-view="log">
          <span class="tab__icon" aria-hidden="true">📖</span><span class="tab__label">Practice Log</span><span class="tab__short">Log</span>
        </button>
        <button class="tab" data-view="pieces">
          <span class="tab__icon" aria-hidden="true">🎼</span><span class="tab__label">Repertoire</span><span class="tab__short">Pieces</span>
        </button>
        <button class="tab" data-view="calendar">
          <span class="tab__icon" aria-hidden="true">📅</span><span class="tab__label">Calendar</span><span class="tab__short">Calendar</span>
        </button>
      </nav>

      <div class="topbar__actions">
        <button class="theme-toggle" id="theme-toggle" role="switch" aria-checked="false" aria-label="Switch between day and night theme" title="Day / night theme">
          <span class="theme-toggle__track">
            <span class="theme-toggle__thumb" id="theme-thumb">☀️</span>
          </span>
        </button>

        <button class="btn btn--ghost sync-btn" id="sync-btn" data-state="off" title="Cloud sync">
          <span class="sync-btn__icon" aria-hidden="true">☁</span><span class="sync-btn__label">Sync</span>
        </button>

        <div class="menu" data-menu>
          <button class="btn btn--ghost" data-menu-toggle aria-haspopup="true" aria-expanded="false">Data ▾</button>
          <div class="menu__list" data-menu-list hidden>
            <button class="menu__item" data-action="import-csv">⬆️ Import CSV…</button>
            <button class="menu__item" data-action="export-pieces">⬇️ Export Repertoire (CSV)</button>
            <button class="menu__item" data-action="export-sessions">⬇️ Export Practice Log (CSV)</button>
            <div class="menu__sep"></div>
            <button class="menu__item" data-action="export-backup">💾 Full Backup (JSON)</button>
            <button class="menu__item" data-action="import-backup">📂 Restore Backup (JSON)…</button>
            <div class="menu__sep"></div>
            <button class="menu__item menu__item--danger" data-action="clear-data">🗑️ Erase all data…</button>
          </div>
        </div>
      </div>
    </header>

    <!-- ===== Main view (rendered by JS) ===== -->
    <main id="view" class="view" tabindex="-1"></main>

    <footer class="footer">
      <span>Made for quiet evenings at the piano · everything is saved on this device</span>
    </footer>
  </div>

  <!-- Hidden file inputs for imports -->
  <input type="file" id="csv-file-input" accept=".csv,text/csv" hidden />
  <input type="file" id="json-file-input" accept=".json,application/json" hidden />

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal__head">
        <h2 id="modal-title" class="modal__title"></h2>
        <button class="modal__close" data-modal-close aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal__body"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>

  <!-- Optional cloud sync: Supabase SDK + your config (app works fully without these) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
